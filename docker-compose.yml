services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reconix
      POSTGRES_USER: ${DB_USER:-reconix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reconix} -d reconix"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-reconix}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/reconix
      DATABASE_DRIVER: postgresql
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_RATE_LIMIT_PER_MINUTE: 100
      AUTH_RATE_LIMIT_PER_MINUTE: 5
      MAX_REQUEST_SIZE_MB: 10
      ENFORCE_HTTPS: ${ENFORCE_HTTPS:-false}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "8000:8000"
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health && wget --no-verbose --tries=1 --spider http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  pgdata:
