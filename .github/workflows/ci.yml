name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reconix_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: fast_api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/reconix_test
          DATABASE_DRIVER: postgresql
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-32chars
          ENVIRONMENT: testing
        run: pytest --cov=fast_api --cov-report=xml -q

  frontend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

      - name: Compile SCSS
        run: npx sass --no-source-map --stop-on-error $(find . -name '*.scss' -not -path './node_modules/*' | head -1) /dev/null 2>/dev/null || echo "No SCSS files to compile"

      - run: npm test -- --coverage --ci

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t reconix-backend ./fast_api

      - name: Build frontend image
        run: docker build -t reconix-frontend ./src

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        working-directory: fast_api
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit Node dependencies
        working-directory: src
        run: npm audit --audit-level=high

  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST scan on backend
        run: semgrep scan --config=auto --error --severity ERROR fast_api/

      - name: Run Semgrep SAST scan on frontend
        run: semgrep scan --config=auto --error --severity ERROR src/
