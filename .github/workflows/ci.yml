name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: fast_api/requirements.txt

      - name: Install dependencies
        run: pip install -r fast_api/requirements.txt greenlet email-validator "bcrypt>=4.0,<4.1"

      - name: Compile check
        run: python -m py_compile fast_api/main.py

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DATABASE_DRIVER: sqlite
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-32chars
          FIELD_ENCRYPTION_KEY: ci-test-encryption-key-for-testing-only-32chars-min
          ENVIRONMENT: testing
          ENABLE_JSON_LOGGING: "false"
          ENABLE_IDEMPOTENCY: "false"
        run: pytest fast_api/tests/ --cov=fast_api --cov-report=xml -q

  frontend-lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm test -- --coverage --ci

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build unified image
        run: docker build -t reconix .

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r fast_api/requirements.txt --ignore-vuln CVE-2026-4539

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit Node dependencies
        run: npm audit --audit-level=high || echo "::warning::npm audit found issues"

  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST scan on backend
        run: semgrep scan --config=auto --error --severity ERROR fast_api/

      - name: Run Semgrep SAST scan on frontend
        run: semgrep scan --config=auto --error --severity ERROR src/
