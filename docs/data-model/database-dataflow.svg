<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="dfbg" x1="0" y1="0" x2="1200" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#0F2035"/>
    </linearGradient>
    <linearGradient id="dfB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C7293"/><stop offset="100%" stop-color="#065A82"/>
    </linearGradient>
    <linearGradient id="dfG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02C39A"/><stop offset="100%" stop-color="#00A17B"/>
    </linearGradient>
    <linearGradient id="dfA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="dfR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/><stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="dfs" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#02C39A"/>
    </marker>
    <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#F59E0B"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#EF4444"/>
    </marker>
    <marker id="ab2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1C7293"/>
    </marker>
  </defs>

  <rect width="1200" height="880" fill="url(#dfbg)"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#FFF" font-size="22" font-weight="700">Reconix Data Flow — SIM Reconciliation Lifecycle</text>
  <text x="600" y="56" text-anchor="middle" fill="#02C39A" font-size="11" letter-spacing="1.5">FROM TELECOM INGESTION THROUGH DELINK EXECUTION TO NOTIFICATION DISPATCH</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 1: SIM INGESTION -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="78" width="1140" height="120" rx="10" fill="#0E1F35" stroke="#1C7293" stroke-width="0.6" filter="url(#dfs)"/>
  <rect x="30" y="78" width="170" height="28" rx="10" fill="url(#dfB)"/>
  <rect x="190" y="78" width="10" height="28" fill="url(#dfB)"/>
  <text x="115" y="96" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">PHASE 1: INGEST</text>

  <!-- Telecom source -->
  <rect x="55" y="120" width="140" height="50" rx="6" fill="#1A2940" stroke="#F59E0B" stroke-width="1"/>
  <text x="125" y="142" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">Telecom Operator</text>
  <text x="125" y="158" text-anchor="middle" fill="#8899AA" font-size="8.5">MTN / Airtel / Glo / 9Mobile</text>

  <!-- Arrow -->
  <line x1="195" y1="145" x2="245" y2="145" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>
  <text x="207" y="138" fill="#02C39A" font-size="7.5">CSV / API</text>

  <!-- Bulk endpoint -->
  <rect x="250" y="118" width="180" height="54" rx="6" fill="#112240" stroke="#1C7293" stroke-width="1"/>
  <text x="340" y="138" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">POST /recycled-sims/bulk</text>
  <text x="340" y="154" text-anchor="middle" fill="#8899AA" font-size="8.5">Up to 10,000 records</text>
  <text x="340" y="166" text-anchor="middle" fill="#8899AA" font-size="8.5">Admin role required</text>

  <!-- Arrow -->
  <line x1="430" y1="145" x2="480" y2="145" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <!-- recycled_sims table -->
  <rect x="485" y="116" width="190" height="58" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="580" y="137" text-anchor="middle" fill="#02C39A" font-size="11" font-weight="700">recycled_sims</text>
  <text x="580" y="153" text-anchor="middle" fill="#7ECABB" font-size="8.5">cleanup_status = PENDING</text>
  <text x="580" y="167" text-anchor="middle" fill="#7ECABB" font-size="8.5">MSISDN / NIN / BVN flags set</text>

  <!-- Arrow to audit -->
  <line x1="675" y1="145" x2="725" y2="145" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#aw)"/>

  <!-- audit_logs -->
  <rect x="730" y="122" width="170" height="46" rx="6" fill="#2D2A1A" stroke="#F59E0B" stroke-width="1"/>
  <text x="815" y="142" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">audit_logs</text>
  <text x="815" y="158" text-anchor="middle" fill="#C4A84D" font-size="8.5">action = bulk_create</text>

  <!-- Idempotency -->
  <rect x="940" y="122" width="200" height="46" rx="6" fill="#1A2940" stroke="#EF4444" stroke-width="0.8"/>
  <text x="1040" y="142" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="600">idempotency_keys</text>
  <text x="1040" y="158" text-anchor="middle" fill="#AA6666" font-size="8.5">Prevents duplicate processing</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 2: VERIFICATION -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="215" width="1140" height="120" rx="10" fill="#0E1F35" stroke="#02C39A" stroke-width="0.6" filter="url(#dfs)"/>
  <rect x="30" y="215" width="170" height="28" rx="10" fill="url(#dfG)"/>
  <rect x="190" y="215" width="10" height="28" fill="url(#dfG)"/>
  <text x="115" y="233" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">PHASE 2: VERIFY</text>

  <!-- SIM source -->
  <rect x="55" y="258" width="160" height="50" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="0.8"/>
  <text x="135" y="278" text-anchor="middle" fill="#02C39A" font-size="10" font-weight="600">recycled_sims</text>
  <text x="135" y="294" text-anchor="middle" fill="#7ECABB" font-size="8.5">Get MSISDNs to check</text>

  <!-- Arrow -->
  <line x1="215" y1="275" x2="265" y2="260" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="215" y1="290" x2="265" y2="305" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <!-- NIN check -->
  <rect x="270" y="246" width="210" height="30" rx="6" fill="#112240" stroke="#1C7293" stroke-width="0.8"/>
  <text x="375" y="266" text-anchor="middle" fill="#FFF" font-size="9.5">POST /nin-linkages/bulk-check</text>

  <!-- BVN check -->
  <rect x="270" y="290" width="210" height="30" rx="6" fill="#112240" stroke="#1C7293" stroke-width="0.8"/>
  <text x="375" y="310" text-anchor="middle" fill="#FFF" font-size="9.5">POST /bvn-linkages/bulk-check</text>

  <!-- Arrow to tables -->
  <line x1="480" y1="261" x2="530" y2="261" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="480" y1="305" x2="530" y2="305" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <!-- nin_linkages -->
  <rect x="535" y="244" width="200" height="34" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="635" y="266" text-anchor="middle" fill="#02C39A" font-size="10" font-weight="600">nin_linkages</text>

  <!-- bvn_linkages -->
  <rect x="535" y="288" width="200" height="34" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="635" y="310" text-anchor="middle" fill="#02C39A" font-size="10" font-weight="600">bvn_linkages</text>

  <!-- Query badge -->
  <rect x="770" y="256" width="280" height="56" rx="6" fill="#112240" stroke="#1C7293" stroke-width="0.8"/>
  <text x="910" y="276" text-anchor="middle" fill="#FFF" font-size="9.5" font-weight="600">Single batched SQL query (no N+1)</text>
  <text x="910" y="294" text-anchor="middle" fill="#8899AA" font-size="8.5">WHERE msisdn IN (...) AND is_active = TRUE</text>
  <text x="910" y="306" text-anchor="middle" fill="#8899AA" font-size="8.5">Returns active linkages for recycled MSISDNs</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 3: DELINK REQUEST -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="352" width="1140" height="120" rx="10" fill="#0E1F35" stroke="#1C7293" stroke-width="0.6" filter="url(#dfs)"/>
  <rect x="30" y="352" width="170" height="28" rx="10" fill="url(#dfB)"/>
  <rect x="190" y="352" width="10" height="28" fill="url(#dfB)"/>
  <text x="115" y="370" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">PHASE 3: REQUEST</text>

  <!-- Operator -->
  <rect x="55" y="395" width="140" height="50" rx="6" fill="#1A2940" stroke="#1C7293" stroke-width="1"/>
  <text x="125" y="415" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">Operator</text>
  <text x="125" y="432" text-anchor="middle" fill="#8899AA" font-size="8.5">role = OPERATOR</text>

  <line x1="195" y1="420" x2="245" y2="420" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="250" y="393" width="200" height="54" rx="6" fill="#112240" stroke="#1C7293" stroke-width="1"/>
  <text x="350" y="413" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">POST /delink-requests</text>
  <text x="350" y="429" text-anchor="middle" fill="#8899AA" font-size="8.5">request_type = BOTH</text>
  <text x="350" y="443" text-anchor="middle" fill="#8899AA" font-size="8.5">recycled_sim_id = validated FK</text>

  <line x1="450" y1="420" x2="500" y2="420" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="505" y="397" width="200" height="46" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="605" y="416" text-anchor="middle" fill="#02C39A" font-size="11" font-weight="700">delink_requests</text>
  <text x="605" y="434" text-anchor="middle" fill="#7ECABB" font-size="8.5">status = PENDING</text>

  <line x1="705" y1="420" x2="755" y2="420" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#aw)"/>

  <rect x="760" y="397" width="170" height="46" rx="6" fill="#2D2A1A" stroke="#F59E0B" stroke-width="1"/>
  <text x="845" y="416" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">audit_logs</text>
  <text x="845" y="434" text-anchor="middle" fill="#C4A84D" font-size="8.5">action = create</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 4: APPROVAL -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="490" width="1140" height="120" rx="10" fill="#0E1F35" stroke="#F59E0B" stroke-width="0.6" filter="url(#dfs)"/>
  <rect x="30" y="490" width="170" height="28" rx="10" fill="url(#dfA)"/>
  <rect x="190" y="490" width="10" height="28" fill="url(#dfA)"/>
  <text x="115" y="508" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">PHASE 4: APPROVE</text>

  <!-- Admin -->
  <rect x="55" y="533" width="140" height="50" rx="6" fill="#1A2940" stroke="#F59E0B" stroke-width="1"/>
  <text x="125" y="553" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">Admin</text>
  <text x="125" y="570" text-anchor="middle" fill="#8899AA" font-size="8.5">role = ADMIN</text>

  <line x1="195" y1="558" x2="245" y2="558" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="250" y="531" width="240" height="54" rx="6" fill="#112240" stroke="#1C7293" stroke-width="1"/>
  <text x="370" y="551" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">POST /delink-requests/{id}/approve</text>
  <text x="370" y="567" text-anchor="middle" fill="#8899AA" font-size="8.5">approved = true | false</text>
  <text x="370" y="581" text-anchor="middle" fill="#8899AA" font-size="8.5">Rejection records reason</text>

  <line x1="490" y1="545" x2="540" y2="545" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="490" y1="570" x2="540" y2="570" stroke="#EF4444" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Approved path -->
  <rect x="545" y="527" width="180" height="30" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="635" y="547" text-anchor="middle" fill="#02C39A" font-size="10" font-weight="600">status = PROCESSING</text>

  <!-- Rejected path -->
  <rect x="545" y="564" width="180" height="30" rx="6" fill="#2D1A1A" stroke="#EF4444" stroke-width="1"/>
  <text x="635" y="584" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="600">status = FAILED</text>

  <!-- Audit -->
  <line x1="725" y1="542" x2="775" y2="558" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#aw)"/>
  <rect x="780" y="540" width="170" height="46" rx="6" fill="#2D2A1A" stroke="#F59E0B" stroke-width="1"/>
  <text x="865" y="559" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">audit_logs</text>
  <text x="865" y="577" text-anchor="middle" fill="#C4A84D" font-size="8.5">action = approve | reject</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 5: EXECUTION -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="628" width="1140" height="120" rx="10" fill="#0E1F35" stroke="#02C39A" stroke-width="0.6" filter="url(#dfs)"/>
  <rect x="30" y="628" width="170" height="28" rx="10" fill="url(#dfG)"/>
  <rect x="190" y="628" width="10" height="28" fill="url(#dfG)"/>
  <text x="115" y="646" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">PHASE 5: EXECUTE</text>

  <!-- Service -->
  <rect x="55" y="670" width="180" height="54" rx="6" fill="#112240" stroke="#1C7293" stroke-width="1"/>
  <text x="145" y="690" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">DelinkService.complete()</text>
  <text x="145" y="706" text-anchor="middle" fill="#8899AA" font-size="8.5">Cascades across 4 tables</text>
  <text x="145" y="718" text-anchor="middle" fill="#8899AA" font-size="8.5">in single transaction</text>

  <!-- Arrows to all affected tables -->
  <line x1="235" y1="680" x2="300" y2="680" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="235" y1="695" x2="300" y2="710" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="235" y1="710" x2="300" y2="730" stroke="#02C39A" stroke-width="2" marker-end="url(#ag)"/>

  <!-- recycled_sims update -->
  <rect x="305" y="666" width="200" height="30" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="405" y="686" text-anchor="middle" fill="#02C39A" font-size="9.5">recycled_sims.status = COMPLETED</text>

  <!-- nin unlink -->
  <rect x="305" y="700" width="200" height="30" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="405" y="720" text-anchor="middle" fill="#02C39A" font-size="9.5">nin_linkages.is_active = FALSE</text>

  <!-- bvn unlink -->
  <rect x="305" y="734" width="200" height="30" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="405" y="754" text-anchor="middle" fill="#02C39A" font-size="9.5">bvn_linkages.is_active = FALSE</text>

  <!-- delink complete -->
  <line x1="505" y1="681" x2="560" y2="695" stroke="#02C39A" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="565" y="680" width="200" height="30" rx="6" fill="#0D3B2C" stroke="#02C39A" stroke-width="1"/>
  <text x="665" y="700" text-anchor="middle" fill="#02C39A" font-size="9.5">delink_requests.status = COMPLETED</text>

  <!-- Notifications created -->
  <line x1="765" y1="695" x2="815" y2="695" stroke="#F59E0B" stroke-width="2" marker-end="url(#aw)"/>
  <rect x="820" y="670" width="180" height="54" rx="6" fill="#2D2A1A" stroke="#F59E0B" stroke-width="1"/>
  <text x="910" y="690" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">notifications</text>
  <text x="910" y="706" text-anchor="middle" fill="#C4A84D" font-size="8.5">SMS to former owner</text>
  <text x="910" y="718" text-anchor="middle" fill="#C4A84D" font-size="8.5">API callback to bank + NIMC</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 6: REPORTING -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="766" width="1140" height="90" rx="10" fill="#0E1F35" stroke="#1C7293" stroke-width="0.6" filter="url(#dfs)"/>
  <rect x="30" y="766" width="170" height="28" rx="10" fill="url(#dfB)"/>
  <rect x="190" y="766" width="10" height="28" fill="url(#dfB)"/>
  <text x="115" y="784" text-anchor="middle" fill="#FFF" font-size="11" font-weight="700">PHASE 6: REPORT</text>

  <rect x="55" y="802" width="200" height="36" rx="6" fill="#112240" stroke="#1C7293" stroke-width="0.8"/>
  <text x="155" y="825" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">GET /dashboard/stats + trends</text>

  <line x1="255" y1="820" x2="310" y2="820" stroke="#1C7293" stroke-width="2" marker-end="url(#ab2)"/>

  <rect x="315" y="802" width="200" height="36" rx="6" fill="#112240" stroke="#02C39A" stroke-width="1"/>
  <text x="415" y="817" text-anchor="middle" fill="#02C39A" font-size="10" font-weight="700">READ REPLICA</text>
  <text x="415" y="832" text-anchor="middle" fill="#7ECABB" font-size="8.5">Auto-fallback to primary</text>

  <line x1="515" y1="812" x2="565" y2="812" stroke="#1C7293" stroke-width="1.5" marker-end="url(#ab2)"/>
  <line x1="515" y1="828" x2="565" y2="828" stroke="#1C7293" stroke-width="1.5" marker-end="url(#ab2)"/>

  <rect x="570" y="800" width="150" height="20" rx="4" fill="#0D3B2C" stroke="#02C39A" stroke-width="0.6"/>
  <text x="645" y="814" text-anchor="middle" fill="#02C39A" font-size="8.5">COUNT(*) recycled_sims</text>

  <rect x="570" y="824" width="150" height="20" rx="4" fill="#0D3B2C" stroke="#02C39A" stroke-width="0.6"/>
  <text x="645" y="838" text-anchor="middle" fill="#02C39A" font-size="8.5">COUNT(*) delink_requests</text>

  <rect x="740" y="800" width="150" height="20" rx="4" fill="#0D3B2C" stroke="#02C39A" stroke-width="0.6"/>
  <text x="815" y="814" text-anchor="middle" fill="#02C39A" font-size="8.5">COUNT(*) nin_linkages</text>

  <rect x="740" y="824" width="150" height="20" rx="4" fill="#0D3B2C" stroke="#02C39A" stroke-width="0.6"/>
  <text x="815" y="838" text-anchor="middle" fill="#02C39A" font-size="8.5">COUNT(*) bvn_linkages</text>

  <!-- Audit retention -->
  <rect x="930" y="798" width="210" height="48" rx="6" fill="#2D2A1A" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="1035" y="818" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Retention Policy</text>
  <text x="1035" y="836" text-anchor="middle" fill="#C4A84D" font-size="8.5">Purge audit_logs older than 365 days</text>

  <!-- Footer -->
  <text x="600" y="872" text-anchor="middle" fill="#556677" font-size="9">Reconix Data Flow — Telecom Ingestion to Delink Execution to Dashboard Reporting — All steps immutably logged in audit_logs</text>
</svg>
