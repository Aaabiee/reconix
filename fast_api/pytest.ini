[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -p no:cacheprovider
filterwarnings =
    ignore::passlib.exc.PasslibHashWarning
    ignore:.*HTTP_422_UNPROCESSABLE_ENTITY.*:DeprecationWarning
    ignore:.*HTTP_413_REQUEST_ENTITY_TOO_LARGE.*:DeprecationWarning
    ignore:.*event_loop_policy.*:DeprecationWarning
markers =
    unit: Unit tests
    integration: Integration tests
    component: Component tests
