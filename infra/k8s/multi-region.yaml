apiVersion: v1
kind: ConfigMap
metadata:
  name: reconix-region-config
  labels:
    app: reconix
data:
  REGION: "${REGION}"
  FAILOVER_MODE: "active-passive"
  PRIMARY_REGION: "af-south-1"
  SECONDARY_REGION: "eu-west-1"
  HEALTH_CHECK_INTERVAL: "15"
  FAILOVER_THRESHOLD: "3"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reconix-ingress
  labels:
    app: reconix
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/websocket-services: "reconix-api"
spec:
  tls:
    - hosts:
        - api.reconix.ng
        - app.reconix.ng
      secretName: reconix-tls
  rules:
    - host: api.reconix.ng
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reconix-api
                port:
                  number: 8000
    - host: app.reconix.ng
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reconix-frontend
                port:
                  number: 3000
---
apiVersion: v1
kind: Secret
metadata:
  name: reconix-secrets
  labels:
    app: reconix
type: Opaque
stringData:
  database-url: "${DATABASE_URL}"
  database-read-replica-url: "${DATABASE_READ_REPLICA_URL}"
  jwt-secret-key: "${JWT_SECRET_KEY}"
  field-encryption-key: "${FIELD_ENCRYPTION_KEY}"
  redis-url: "${REDIS_URL}"
  sentry-dsn: "${SENTRY_DSN}"
