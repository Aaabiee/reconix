apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconix-api
  labels:
    app: reconix
    component: api
    region: ${REGION}
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: reconix
      component: api
  template:
    metadata:
      labels:
        app: reconix
        component: api
        region: ${REGION}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: reconix/api:${IMAGE_TAG}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reconix-secrets
                  key: database-url
            - name: DATABASE_READ_REPLICA_URL
              valueFrom:
                secretKeyRef:
                  name: reconix-secrets
                  key: database-read-replica-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: reconix-secrets
                  key: jwt-secret-key
            - name: FIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: reconix-secrets
                  key: field-encryption-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: reconix-secrets
                  key: redis-url
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: reconix-secrets
                  key: sentry-dsn
            - name: CORS_ORIGINS
              value: '["https://reconix.ng","https://app.reconix.ng"]'
            - name: ENABLE_JSON_LOGGING
              value: "true"
            - name: ENABLE_METRICS
              value: "true"
            - name: ENABLE_TRACING
              value: "true"
            - name: ENABLE_WEBSOCKET
              value: "true"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
      terminationGracePeriodSeconds: 35
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: reconix
                    component: api
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: reconix-api
  labels:
    app: reconix
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: reconix
    component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: reconix-api-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: reconix
      component: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reconix-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reconix-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
